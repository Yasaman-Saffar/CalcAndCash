{% if questions %}
    {% for q in questions %}
    <div class="card border-0 shadow-sm rounded-4 mb-3">
        <div class="card-body p-3 d-flex justify-content-between align-items-center">
            <div>
                <span class="badge {% if type == 'unsolved' %}bg-info-subtle text-info{% else %}bg-success-subtle text-success{% endif %} rounded-pill px-3 py-1 mb-2">Q{{ q.question.number }}</span>
                <div class="fw-bold fs-6">Difficulty: {{ q.question.difficulty }}</div>
            </div>
            <a class="btn {% if type == 'unsolved' %}btn-info text-white{% else %}btn-outline-success{% endif %} btn-sm rounded-3 fw-bold" href="{% url 'group-question' q.id %}">
                {% if type == 'unsolved' %}Solve{% else %}View{% endif %}
            </a>
        </div>
    </div>
    {% endfor %}
{% else %}
    <div class="card border-0 shadow-none bg-light rounded-4 text-center py-4">
        <p class="text-muted mb-0 small">No questions available.</p>
    </div>
{% endif %}
