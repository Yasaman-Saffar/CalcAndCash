{% load static %}

<link rel="stylesheet" href="{% static "leaderboard/style.css" %}">


{% if leaderboard %}
<h3 class="text-light text-center d-none d-lg-block"><i class="bi bi-trophy text-warning me-2"></i>Leaderboard</h3>
    <div class="table-responsive rounded-4 text-center w-100">
        <table class="table table-striped table-sm mb-0">
            <thead>
                <tr>
                    <th class="table-info">Rank</th>
                    <th class="table-info">Group</th>
                    <th class="table-info">Total Assets</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                {% for item in leaderboard %}
                <tr data-id="{{ item.id }}">
                    <td class="table-warning">{{ item.rank }}</td>
                    <td class="table-warning">{{ item.name }}</td>
                    <td class="table-warning">{{ item.score }}</td>
                </tr>
                {% empty %}
                <tr><td colspan="3">No Data</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% endif %}
