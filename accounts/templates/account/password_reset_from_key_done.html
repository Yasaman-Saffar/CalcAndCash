{% extends "account/base_accounts.html" %}
{% load i18n %}

{% block head_title %}{% trans "Change Password" %}{% endblock head_title %}

{% block content %}
  <div class="text-center">
    <div class="mb-3">
      <span class="d-inline-flex align-items-center justify-content-center rounded-circle bg-success-subtle text-success"
            style="width: 72px; height: 72px;">
        <i class="bi bi-check2-circle fs-2"></i>
      </span>
    </div>

    <h1 class="h4 fw-bold mb-2">{% trans "Password Changed" %}</h1>

    <p class="text-muted small mb-4">
      {% trans "Your password is now changed." %}
    </p>

    <a href="{% url 'account_login' %}" class="btn btn-primary rounded-4 fw-semibold w-100">
      {% trans "Sign In" %}
    </a>
  </div>
{% endblock content %}
